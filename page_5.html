<!DOCTYPE html>
<html>
	<head>
		    <title></title>
	</head>
	<body>

		<form action="" method="POST">
			<div>
 
			<label for="fname">First Name*:</label>
			<input type="text" name="First Name" id="fname" placeholder="Spongebob" required/>

			</div>

			<br /> 

			<div>
 
			<label for="lname">Last  Name:</label>
			<input type="text" name="Last Name" id="lname" placeholder="Squarepants"/>

			</div>

			<br />

			<div>
 
			<label for="password">Password*:</label>
			<input type="password" name="password" id="password" maxlength=12 required/>

			</div>
			<br /> 
			<div>
 
			<label for="email">Email Address*:</label>
			<input type="email" name="email" id="email_address" required placeholder="spants@gmail.com"/>


			</div>

			<br /> 

			<div>
				<label for="date">Birthday:</label>
				<input type="date" name="date" id="date" />
			</div>
			<br /> 

			<div>
				<label for="quantity">Quantity*:</label>
				<input type="number" name="quantity" id="quantity" min=0 value=1 max=99 required/>
			</div>

			<br /> 
			
			<div>


				<label for="tel">Phone Number*:</label>
 				<input type="tel" name="tel" id="tel" required/>
			</div>
			<br /> 

			<div>
 				<label for="sex">Sex:</label>
					<br /> 
 
					<label for="male">Male:</label>
					<input type="radio" name="sex" value="male" id="male" />

					<label for="female">Female:</label>
					<input type="radio" name="sex" value="female" id="female" />

					<label for="else">Else:</label>
					<input type="radio" name="sex" value="else" id="else" />

					<label for="nun">Perfer not to say:</label>
					<input type="radio" name="sex" value="not_saying" id="nun" />


			</div>

			<br /> 

			<div>
 
				<label for="payment">Select your payment method*:</label>
				<select name="payment" id="payment" >
					<option value="visa">Visa</option>
					<option value="mastercard">mastercard</option>
					<option value="giftcard">giftcard</option>

				</select>
			</div>

			<br /> 
				<label for="cookie">click for a cookie*:</label>
				<input type="checkbox" name="cookie" value="cookie_yes" id="cookie" />
			<div>
 
		 	<br /> 
				<input type="reset" value="Nuke" /> 

			</div>

			<br /> 

			<div>
				<input type="submit" value="Done?" /> 
			</div>


		</form>
